# emphysema_env.yaml
# Conda environment for the Emphysema Quantification module.
# Source: https://github.com/bdrad/Emphysema_Quantification


name: emphysema

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip
  - pip:
    - pydicom>=2.3.0
    - pylibjpeg>=1.4.0
    - pylibjpeg-libjpeg>=1.3.1
    - numpy>=1.23.0
    - pandas>=1.4.2
    - matplotlib>=3.5.1
    - scipy>=1.8.1
    - scikit-image>=0.19.2
    - scikit-learn>=1.1.0
    - opencv-python-headless>=4.6.0
    - SimpleITK>=2.1.1
    - statsmodels>=0.13.2
    - ipywidgets>=7.6.5
    - ipykernel>=6.9.1
    - nibabel>=5.0
