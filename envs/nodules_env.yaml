# nodules_env.yaml
# Conda environment for the Lung Nodule Detection module.
# Source: https://github.com/rlsn/LungNoduleDetection

name: nodules
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # PyTorch — NVIDIA GPU (CUDA 12.4)
  - pytorch>=2.6
  - torchvision
  - pytorch-cuda=12.4

  - pip:
    # HuggingFace — pinned to 4.37 for compatibility with VitDet3D
    - transformers==4.37
    - huggingface-hub==0.36.2
    - accelerate>=1.0

    # NIfTI loading
    - nibabel>=5.0
    - numpy>=1.24

    # Eval helpers
    - scikit-learn>=1.1